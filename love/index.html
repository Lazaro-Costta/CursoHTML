<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>andreynalagares</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff4b6e,#6a5cff);
font-family:sans-serif;
overflow:hidden;
color:white;
}

/* container */

.container{
text-align:center;
z-index:2;
}

button{
padding:15px 40px;
font-size:22px;
border:none;
border-radius:40px;
cursor:pointer;
background:white;
color:#ff4b6e;
font-weight:bold;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

/* mensagem */

.message{
margin-top:40px;
font-size:40px;
opacity:0;
transition:1s;
}

.show{
opacity:1;
}

/* corações */

.heart{
position:absolute;
bottom:-50px;
font-size:25px;
animation:float 6s linear infinite;
opacity:0.7;
}

@keyframes float{
0%{
transform:translateY(0) scale(1);
opacity:0;
}
50%{
opacity:1;
}
100%{
transform:translateY(-110vh) scale(1.5);
opacity:0;
}
}

/* efeito de explosão */

.explode{
animation:explode 0.8s ease;
}

@keyframes explode{
0%{transform:scale(1)}
50%{transform:scale(1.3)}
100%{transform:scale(1)}
}

</style>
</head>

<body>

<div class="container">

<button id="btn">Click Me ❤️</button>

<div class="message" id="message"></div>

</div>

<script>

/* texto com efeito de digitação */

const text = "Feliz Dia da Mulher! andreyna lagares ✨ Que você se sinta abraçada e reconhecida por todo o seu valor e essência única.❤️";

let i = 0;

function typeWriter(){
if(i < text.length){
document.getElementById("message").innerHTML += text.charAt(i);
i++;
setTimeout(typeWriter,80);
}
}

/* botão */

const btn = document.getElementById("btn");

btn.addEventListener("click",()=>{

btn.classList.add("explode");

const msg = document.getElementById("message");

msg.classList.add("show");

typeWriter();

});

/* criar corações */

function createHeart(){

const heart = document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration = 4 + Math.random()*3 +"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},7000);

}

setInterval(createHeart,300);

</script>

</body>
</html>
